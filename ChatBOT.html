<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HelpFull - ChatBOT</title>
    <style>
        /* =======================================
           CONFIGURAÇÕES GLOBAIS E FUNDO
           ======================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            color: #1a1a1a;
            overflow: hidden;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* ZOOM RESPONSIVO COMPENSADO PARA TELA CHEIA (Chat) */
        @media (min-width: 1440px) { 
            body { zoom: 1.25; height: 80vh; } 
            .caixa-chat { max-width: 800px; font-size: 0.85rem; } 
        }
        @media (min-width: 1200px) and (max-width: 1439px) { 
            body { zoom: 1.15; height: 86.95vh; } 
            .caixa-chat { max-width: 850px; font-size: 0.9rem; } 
        }
        @media (min-width: 1024px) and (max-width: 1199px) { 
            body { zoom: 1.05; height: 95.23vh; } 
            .caixa-chat { max-width: 900px; font-size: 0.95rem; } 
        }

        /* IMAGEM DE FUNDO TRAVADA */
        .imagem-fundo {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -999;
            pointer-events: none;
        }

        /* CONTAINER PRINCIPAL */
        .conteudo-site {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 95px 20px 20px 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
        }

        /* =======================================
           NAVBAR ESTÁTICA DO TOPO (Estilo Cápsula)
           ======================================= */
        .navbar-topo {
            display: flex;
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: fit-content;
            z-index: 1000;
            justify-content: space-between;
            align-items: center;
            gap: 30px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 12px 30px;
            border-radius: 50px;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .nav-logo {
            font-weight: 900;
            font-size: 1.05rem;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 25px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: #1a1a1a;
            font-weight: 700;
            font-size: 0.95rem;
            transition: color 0.3s;
        }

        .nav-links a.ativo {
            color: #2b7a8c;
        }

        .nav-links a:hover {
            opacity: 0.7;
        }

        .perfil-capsula {
            width: 36px;
            height: 36px;
            background: #333;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            flex-shrink: 0;
        }

        /* =======================================
           JANELA DO CHAT (EFEITO VIDRO)
           ======================================= */
        .caixa-chat {
            background: rgba(235, 235, 235, 0.85);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05), inset 0 2px 5px rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            flex: 1;
            min-height: 0;
            overflow: hidden;
            margin-bottom: 5px;
            margin-left: auto;
            margin-right: auto;
            width: 100%;
        }

        /* ÁREA DAS MENSAGENS */
        .area-mensagens {
            flex: 1;
            padding: 30px 40px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            overflow-y: auto;
        }

        /* Estilos dos Balões de Mensagem */
        .mensagem {
            max-width: 75%;
            padding: 20px 30px;
            font-size: 1.15rem;
            font-weight: 500;
            line-height: 1.5;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            animation: fadeIn 0.3s ease;
        }

        /* Mensagem do Usuário (Direita, Azul Claro) */
        .msg-usuario {
            align-self: flex-end;
            background-color: #badbeb;
            color: #1a1a1a;
            border-radius: 35px 35px 10px 35px;
        }

        /* Mensagem do Bot (Esquerda, Cinza Claro) */
        .msg-bot {
            align-self: flex-start;
            background-color: #d1d1d1;
            color: #1a1a1a;
            border-radius: 35px 35px 35px 10px;
        }

        /* Balão de "Digitando..." */
        .msg-bot-digitando {
            align-self: flex-start;
            background-color: #d1d1d1;
            padding: 10px 25px;
            border-radius: 35px 35px 35px 10px;
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 4px;
            line-height: 1;
            color: #333;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Placeholder grande do Bot (O quadrado cinza) */
        .msg-bot-placeholder {
            align-self: flex-start;
            background-color: #d1d1d1;
            width: 350px;
            height: 160px;
            border-radius: 30px 30px 30px 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        /* =======================================
           ÁREA DE DIGITAÇÃO (RODAPÉ DO CHAT)
           ======================================= */
        .area-input-chat {
            padding: 0 40px 30px 40px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .input-chat {
            flex: 1;
            padding: 20px 30px;
            border-radius: 35px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            background: rgba(225, 225, 225, 0.6);
            /* recess grey */
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05), 0 5px 15px rgba(0, 0, 0, 0.03);
            font-size: 1.15rem;
            outline: none;
            color: #1a1a1a;
            font-weight: 700;
            font-family: inherit;
        }

        .input-chat::placeholder {
            color: #888;
            font-weight: 700;
        }

        .btn-enviar-chat {
            width: 63px;
            height: 63px;
            border-radius: 25px;
            background-color: #badbeb;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, background-color 0.2s;
            flex-shrink: 0;
        }

        .btn-enviar-chat:hover {
            transform: scale(1.05);
            background-color: #a0ccde;
        }

        /* Ícone de Enviar */
        .icone-enviar {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: #1a1a1a;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* =======================================
           SEÇÃO BRANCA FINAL (RODAPÉ)
           ======================================= */
        .secao-branca {
            background-color: #ffffff;
            width: 100%;
            position: relative;
            z-index: 10;
            margin-top: auto;
        }

        .secao-branca-conteudo {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            padding: 25px 20px;
        }

        .rodape-simples {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 20px;
            padding: 0 10px;
        }

        .rodape-simples strong {
            font-size: 1.2rem;
            letter-spacing: -1px;
            font-weight: 900;
        }

        .contato-info {
            line-height: 1.6;
            font-size: 0.85rem;
            text-align: left;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* =======================================
           RESPONSIVIDADE
           ======================================= */
        @media (max-width: 1024px) {
            .navbar-topo { width: 90%; }
            .nav-links { gap: 15px; }
            .nav-links a { font-size: 0.9rem; }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; }
            .navbar-topo {
                padding: 12px 25px;
                width: calc(100% - 40px);
                justify-content: space-between;
            }
            .conteudo-site { padding-top: 110px; }
            .caixa-chat { border-radius: 25px; height: calc(100vh - 200px); }
            .area-mensagens { padding: 30px; }
            .mensagem { max-width: 90%; font-size: 1rem; }
            .area-input-chat { padding: 0 30px 30px 30px; }
            .msg-bot-placeholder { width: 250px; height: 120px; }
        }

        @media (max-width: 480px) {
            .navbar-topo { width: calc(100% - 30px); padding: 12px 20px; }
            .conteudo-site { padding-top: 100px; }
            .area-mensagens { padding: 20px; }
            .area-input-chat { padding: 0 20px 20px 20px; }
            .input-chat { padding: 15px 20px; font-size: 1rem; }
            .btn-enviar-chat { width: 50px; height: 50px; border-radius: 20px; }
            .msg-bot-placeholder { width: 100%; height: 100px; }
        }
    </style>
</head>

<body>

    <img class="imagem-fundo" src="assets/HELPFULL.png" alt="Plano de Fundo HelpFull">

    <div class="conteudo-site">

        <nav class="navbar-topo">
            <a href="inicio.html" class="nav-logo" style="text-decoration: none; color: inherit;">HELPFULL</a>
            <ul class="nav-links">
                <li><a href="Diario.html">Diário</a></li>
                <li><a href="Comunidade.html">Comunidade</a></li>
                <li><a href="ChatBOT.html" class="ativo">ChatBOT</a></li>
                <li><a href="#">Adicionais</a></li>
            </ul>
            <div class="perfil-capsula">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </div>
        </nav>

        <div class="caixa-chat">

            <div class="area-mensagens" id="area-mensagens">

                <div class="mensagem msg-bot">
                    Olá! Aqui é o seu assistente HelpFull. Como posso te apoiar hoje?
                </div>

            </div>

            <div class="area-input-chat">
                <input type="text" class="input-chat" id="inputChat"
                    placeholder="Digite aqui para conversar com o ChatBOT..." onkeypress="verificarEnter(event)">

                <button class="btn-enviar-chat" onclick="enviarMensagem()">
                    <svg class="icone-enviar" viewBox="0 0 24 24">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>

        </div>

    </div>


    <script>
        async function enviarMensagem() {
            const input = document.getElementById('inputChat');
            const mensagemTexto = input.value.trim();
            const areaMensagens = document.getElementById('area-mensagens');

            if (mensagemTexto !== "") {
                // Remove os placeholders default se existirem
                const placeholders = document.querySelectorAll('.msg-bot-placeholder');
                placeholders.forEach(el => el.remove());

                // Função de segurança básica e formatação de texto do Bot (Negrito, quebras de linha)
                const formatarTexto = (texto) => {
                    return texto
                        .replace(/</g, "&lt;").replace(/>/g, "&gt;") // Escapa HTML para segurança
                        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                        .replace(/\n/g, '<br>');
                };

                // Cria e exibe a mensagem do usuário
                const novaMensagemHTML = `
                    <div class="mensagem msg-usuario">
                        ${mensagemTexto.replace(/</g, "&lt;").replace(/>/g, "&gt;")}
                    </div>
                `;
                areaMensagens.insertAdjacentHTML('beforeend', novaMensagemHTML);
                areaMensagens.scrollTop = areaMensagens.scrollHeight;
                input.value = "";

                // Cria e exibe a bolha de "digitando..." referenciada via id
                const idDigitando = "digitando-" + Date.now();
                const botDigitandoHTML = `<div class="msg-bot-digitando" id="${idDigitando}">...</div>`;
                areaMensagens.insertAdjacentHTML('beforeend', botDigitandoHTML);
                areaMensagens.scrollTop = areaMensagens.scrollHeight;

                try {
                    // Chama a API do Flask em app.py
                    const response = await fetch("http://localhost:5000/chat", {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ message: mensagemTexto })
                    });
                    
                    const data = await response.json();
                    
                    // Remove indicador de carregamento
                    document.getElementById(idDigitando).remove();
                    
                    // Insere resposta do Bot formatada
                    const botMensagemHTML = `
                        <div class="mensagem msg-bot">
                            ${formatarTexto(data.reply || "Ops, não rolou nenhuma resposta.")}
                        </div>
                    `;
                    areaMensagens.insertAdjacentHTML('beforeend', botMensagemHTML);
                } catch (error) {
                    console.error("Erro no chat:", error);
                    document.getElementById(idDigitando).remove();
                    
                    // Mostra erro caso app.py(backend) esteja desligado
                    const erroHTML = `
                        <div class="mensagem msg-bot" style="color: #a12b2b;">
                            Parece que o Helper (app.py) está offline! Não esqueça de ligar o servidor para continuarmos nossa conversa.
                        </div>
                    `;
                    areaMensagens.insertAdjacentHTML('beforeend', erroHTML);
                }
                
                areaMensagens.scrollTop = areaMensagens.scrollHeight;
            }
        }

        function verificarEnter(event) {
            if (event.key === "Enter") {
                enviarMensagem();
            }
        }
    </script>
</body>

</html>
